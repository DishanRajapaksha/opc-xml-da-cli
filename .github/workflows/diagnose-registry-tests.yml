name: Restore legacy normaliser compatibility

on:
  push:
    branches:
      - agent/adopt-registry-parser

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-parser
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Preserve legacy single-dash flags
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("internal/cli/app.go")
          text = path.read_text()
          old = '''func normaliseGlobalFlags(args []string) ([]string, error) {
          \treturn command.NormalizeGlobalFlagsForRegistry(args, cliRegistry)
          }
          '''
          new = '''func normaliseGlobalFlags(args []string) ([]string, error) {
          \tif len(args) > 0 && strings.HasPrefix(args[0], "-") && !strings.HasPrefix(args[0], "--") {
          \t\treturn args, nil
          \t}
          \treturn command.NormalizeGlobalFlagsForRegistry(args, cliRegistry)
          }
          '''
          if old not in text:
              raise SystemExit("normaliser block not found")
          path.write_text(text.replace(old, new, 1))
          PY
          gofmt -w internal/cli/app.go
          go test ./...
      - name: Commit compatibility fix
        run: |
          if git diff --quiet -- internal/cli/app.go; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/cli/app.go
          git commit -m "Preserve legacy single-dash flags"
          git push origin HEAD:agent/adopt-registry-parser
