name: Diagnose registry tests

on:
  push:
    branches:
      - agent/adopt-registry-parser
  pull_request:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Capture tests
        run: |
          set +e
          go test ./... > test.log 2>&1
          status=$?
          echo "$status" > test.status
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: registry-test-log
          path: |
            test.log
            test.status
