name: Capture registry test failure

on:
  push:
    branches:
      - agent/adopt-command-registry
  pull_request:

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Capture tests and completion output
        run: |
          go test ./... > test.log 2>&1 || true
          go run . completions bash > completion.txt 2> completion.err || true
      - uses: actions/upload-artifact@v4
        with:
          name: registry-diagnostics
          path: |
            test.log
            completion.txt
            completion.err
