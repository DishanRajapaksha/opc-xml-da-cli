name: build

on:
  pull_request:
  push:
    tags:
      - "*"

jobs:
  test-contracts:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Apply CLI contract migration
        run: python3 scripts/apply-cli-contracts.py

      - name: Format
        run: gofmt -w internal/output/output.go internal/cli/app.go internal/cli/contracts_test.go

      - name: Test
        id: tests
        continue-on-error: true
        run: go test ./... 2>&1 | tee test.log

      - name: Build
        id: build
        continue-on-error: true
        run: go build ./... 2>&1 | tee build.log

      - name: Package migrated files
        if: always()
        run: |
          tar -czf cli-contracts.tar.gz \
            internal/output/output.go \
            internal/cli/app.go \
            internal/cli/contracts_test.go \
            README.md \
            test.log \
            build.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cli-contracts
          path: cli-contracts.tar.gz

      - name: Fail on validation errors
        if: steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: exit 1

  build:
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          go build -trimpath -ldflags="-s -w" -o "dist/opc-xml-da-cli-${GOOS}-${GOARCH}${{ matrix.ext }}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opc-xml-da-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/opc-xml-da-cli-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
