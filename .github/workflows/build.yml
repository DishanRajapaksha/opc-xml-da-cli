name: build

on:
  pull_request:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  review-fixes:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: agent/align-cli-contracts
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Apply review fixes
        run: python3 scripts/fix-cli-contract-review.py

      - name: Format
        run: gofmt -w internal/cli/app.go

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Commit verified source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md internal/cli/app.go
          git commit -m "Fix OPC XML-DA format contract"
          git push origin HEAD:agent/align-cli-contracts

  build:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - run: echo "tag build is handled by the restored workflow"
