name: Generate registry go.sum

on:
  push:
    branches:
      - agent/adopt-command-registry
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go mod tidy
      - uses: actions/upload-artifact@v4
        with:
          name: registry-go-sum
          path: go.sum
