name: Apply corrected CLI kit dependency

on:
  push:
    branches:
      - agent/adopt-command-registry

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-command-registry
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: |
          go get github.com/DishanRajapaksha/industrial-cli-kit@cd602304d5057891c559de21bf4f4c73891e4cd7
          go mod tidy
      - name: Commit corrected dependency
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add go.mod go.sum
          git commit -m "Use corrected CLI kit completion generator"
          git push
