name: Apply registry parser migration

on:
  push:
    branches:
      - agent/adopt-registry-parser

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-parser
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Replace private parser
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("internal/cli/app.go")
          text = path.read_text()
          command_import = '\t"github.com/DishanRajapaksha/industrial-cli-kit/command"\n'
          exit_import = '\t"github.com/DishanRajapaksha/industrial-cli-kit/exitcode"\n'
          if command_import not in text:
              text = text.replace(exit_import, command_import + exit_import, 1)

          start = text.index("func normaliseGlobalFlags")
          end = text.index("func (a *App) completions", start)
          replacement = '''func normaliseGlobalFlags(args []string) ([]string, error) {
          \treturn command.NormalizeGlobalFlagsForRegistry(args, cliRegistry)
          }

          '''
          text = text[:start] + replacement + text[end:]
          path.write_text(text)
          PY
          gofmt -w internal/cli/app.go
      - name: Resolve shared CLI kit
        run: |
          go get github.com/DishanRajapaksha/industrial-cli-kit@affb87edac45
          go mod tidy
      - name: Commit migration
        run: |
          if git diff --quiet -- internal/cli/app.go go.mod go.sum; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add internal/cli/app.go go.mod go.sum
          git commit -m "Use registry-aware global flag parsing"
          git push origin HEAD:agent/adopt-registry-parser
