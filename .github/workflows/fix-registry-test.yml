name: Fix registry completion assertion

on:
  push:
    branches:
      - agent/adopt-command-registry

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-command-registry
      - name: Update shared completion assertion
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('internal/cli/app_test.go')
          text = path.read_text()
          old = 'complete -F _opc_xml_da_cli opc-xml-da-cli'
          new = 'complete -F _opc_xml_da_cli_completion opc-xml-da-cli'
          if old not in text:
              raise SystemExit('expected legacy assertion was not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Commit assertion update
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/cli/app_test.go
          git commit -m "Update shared completion assertion"
          git push
