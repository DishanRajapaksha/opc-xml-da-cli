name: Adopt registry-driven help

on:
  push:
    branches:
      - agent/adopt-registry-help

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/adopt-registry-help
      - name: Replace manual root help
        run: |
          python - <<'PY'
          from pathlib import Path
          signature = 'func (a *App) printUsage()'
          matches = []
          for path in Path('internal/cli').glob('*.go'):
              text = path.read_text()
              if signature in text:
                  matches.append((path, text))
          if len(matches) != 1:
              raise SystemExit(f'expected one printUsage definition, found {len(matches)}')
          path, text = matches[0]
          start = text.index(signature)
          brace = text.index('{', start)
          depth = 0
          end = None
          for index in range(brace, len(text)):
              if text[index] == '{': depth += 1
              elif text[index] == '}':
                  depth -= 1
                  if depth == 0:
                      end = index + 1
                      break
          if end is None: raise SystemExit('printUsage closing brace not found')
          path.write_text(text[:start] + signature + ' {\n\ta.writeRegistryUsage()\n}' + text[end:])
          print(path)
          PY
      - name: Commit help migration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add internal/cli
          git commit -m "Render root help from command registry"
          git push
